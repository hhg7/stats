name             = Stats-LikeR
author           = David E. Condon <dec986@gmail.com>
license          = Perl_5
copyright_year   = 2026-present
copyright_holder = David E. Condon

[@Filter]
-bundle = @Basic
-remove = MakeMaker
-remove = GatherDir

[Git::GatherDir]
exclude_filename = Makefile.PL

[PruneFiles]
match = ^(?!lib/|t/|pod/|LikeR\.xs$|ppport\.h$|README(\.md)?$|Changes$|Makefile\.PL$|META\.(yml|json)$|LICENSE$|MANIFEST$).

[MakeMaker::Awesome]
eumm_version = 6.48
header = use Config;
header = my $std = ($Config{gccversion} || $Config{cc} =~ /\b(?:g?cc|clang)\b/) ? ' -std=gnu99' : '';
WriteMakefile_arg = CCFLAGS => $Config::Config{ccflags} . $std
WriteMakefile_arg = LIBS => ['-lm']

[VersionFromModule]
[MetaJSON]

; --- Runtime prerequisites ---------------------------------------------------
; Devel::Confess was REMOVED from here. As a declared runtime dependency it was
; installed (and activated) by CPAN smoke rigs, where it rewrites the die path
; to attach a stack-trace object to every exception. Test::LeakTrace then counts
; that object as a leak on every croak path -> the constant "leaks 12 <= 0"
; failures. It is a debugging aid, not something this module needs at runtime.
; Make sure nothing under lib/ does `use Devel::Confess` either.
;
; autodie is kept only if lib/ actually uses it lexically; if not, drop it too.
[Prereqs]
perl                = 5.010
autodie             = 0
Cwd                 = 0
Scalar::Util        = 1.22
Test::Exception     = 0
Test::LeakTrace     = 0
Test::More          = 0
Devel::Confess      = 0

[MetaResources]
repository.web = https://github.com/hhg7/stats
repository.url = https://github.com/hhg7/stats.git
repository.type = git
bugtracker.web = https://github.com/hhg7/stats/issues
homepage = https://metacpan.org/dist/stats
