name		= Stats-LikeR
author	= David E. Condon <dec986@gmail.com>
license	= Perl_5
copyright_year = 2026-present
copyright_holder = David E. Condon

[@Basic]
[VersionFromModule]
[Prereqs]
perl                = 5.010
autodie             = 0
Devel::Confess      = 0
Digest::SHA         = 0
Test::Exception     = 0
Test::LeakTrace     = 0
Test::More          = 0
; Replace your standard [MakeMaker] line with this:
[MakeMaker::Awesome]
WriteMakefile_arg = CCFLAGS => do { use Config; my $cc = $Config{ccflags} || ''; if ($^O eq 'solaris') { $cc .= ' -D__EXTENSIONS__'; $cc .= ' -std=gnu99' if $Config{cc} =~ /gcc/; } $cc }
[MetaResources]
repository.web = https://github.com/hhg7/stats
repository.url = git://github.com/hhg7/stats
repository.type = git
bugtracker.web = https://github.com/hhg7/stats/issues
homepage = https://metacpan.org/dist/stats
