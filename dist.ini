name             = Stats-LikeR
author           = David E. Condon <dec986@gmail.com>
license          = Perl_5
copyright_year   = 2026-present
copyright_holder = David E. Condon

[@Filter]
-bundle = @Basic
-remove = MakeMaker
-remove = GatherDir

[Git::GatherDir]


[PruneFiles]
; keep only the files a CPAN user needs; prune everything else that's tracked
match = ^(?!lib/|t/|LikeR\.xs$|ppport\.h$|README(\.md)?$|Changes$).

[MakeMaker::Awesome]
WriteMakefile_arg = CCFLAGS => $Config::Config{ccflags} . ' -std=gnu99'

[VersionFromModule]
[Prereqs]
perl                = 5.010
autodie             = 0
Devel::Confess      = 0
Digest::SHA         = 0
Scalar::Util        = 0
Test::Exception     = 0
Test::LeakTrace     = 0
Test::More          = 0
[MetaResources]
repository.web = https://github.com/hhg7/stats
repository.url = git://github.com/hhg7/stats
repository.type = git
bugtracker.web = https://github.com/hhg7/stats/issues
homepage = https://metacpan.org/dist/stats
